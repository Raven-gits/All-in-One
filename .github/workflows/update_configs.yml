name: Update Configs

on:
  workflow_dispatch:
    inputs:
      new_subs:
        description: 'New subscription links (comma separated)'
        required: false
        type: string
  schedule:
    - cron: '0 0 */1 * *'   # هر ۳ ساعت

# از اجرای هم‌زمان جلوگیری کن (فقط یک job فعال باشد)
concurrency:
  group: config-update
  cancel-in-progress: false   # صبر کن تا قبلی تمام شود

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Add new subscription links (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.new_subs != ''
        env:
          NEW_SUBS: ${{ inputs.new_subs }}
        run: |
          printf '%s\n' "$NEW_SUBS" | tr ',' '\n' | sed '/^[[:space:]]*$/d' >> subscriptions.txt

      - name: Run config updater
        run: python tools/config-update/config_updater.py

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # فقط فایل‌هایی که باید commit شوند
          git add v2rays subscriptions.txt tools/config-update/runtime/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update configs [skip ci]"

          # حالا که concurrency فعال است، یک push ساده کافیست
          git push origin HEAD:main
